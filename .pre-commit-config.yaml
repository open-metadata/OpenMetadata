default_language_version:
  python: python3
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
        # TODO: investigate and fix or remove the excluded files. The first
        # three carry real JSON issues (duplicate keys, malformed/empty
        # content) that pre-commit-hooks v2.3.0 didn't catch; v5.0.0 does.
        # The last is an intentionally malformed test fixture.
        exclude: |
          (?x)^(
            .*vscode.*|
            openmetadata-spec/src/main/resources/rdf/contexts/dataAsset\.jsonld|
            ingestion/examples/sample_data/pipelines/tasks\.json|
            openmetadata-service/src/main/resources/dataInsights/opensearch/indexSettingsTemplate\.json|
            openmetadata-ui/src/main/resources/ui/playwright/test-data/odcs-examples/invalid-malformed\.json
          )$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        files: ^(ingestion|openmetadata-airflow-apis)/
        args: ["--fix", "--config", "ingestion/pyproject.toml"]
      - id: ruff-format
        files: ^(ingestion|openmetadata-airflow-apis)/
        args: ["--config", "ingestion/pyproject.toml"]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.5.1
    hooks:
      - id: prettier
        files: ^openmetadata-service/src/main/resources/json/schema/
  - repo: local
    hooks:
      - id: google-style-java
        name: Google Java Code Style for Java
        description: Formats code in Google's Java codestyle with 120 line length.
        entry: scripts/format-code.sh
        language: script
        files: \.java$
        require_serial: true
      - id: token-audit
        name: Design token audit (no hardcoded CSS values)
        description: Fails if committed UI CSS/LESS contains hardcoded colors or spacing instead of design tokens. See openmetadata-ui/src/main/resources/ui/specs/.
        entry: node openmetadata-ui/src/main/resources/ui/scripts/token-audit.js
        language: system
        files: ^openmetadata-ui/src/main/resources/ui/src/.*\.(less|css)$
        require_serial: true
      - id: token-drift
        name: Design token drift (generated files, token refs, spec links)
        description: Fails if tokens.css / token-reference.md are stale (run yarn token-gen), a referenced token is undefined, or a component spec links to a missing file.
        entry: node openmetadata-ui/src/main/resources/ui/scripts/design-tokens/check-drift.js
        language: system
        files: ^openmetadata-ui/src/main/resources/ui/(src/styles/tokens\.css|src/.*\.(less|css)|specs/.*\.md)$
        pass_filenames: false
        require_serial: true
