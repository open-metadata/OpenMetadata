source:
  type: databricks
  serviceName: e2e_databricks
  serviceConnection:
    config:
      type: Databricks
      hostPort: $E2E_DATABRICKS_HOST_PORT
      httpPath: $E2E_DATABRICKS_HTTP_PATH
      authType:
        token: $E2E_DATABRICKS_TOKEN
      catalog: e2e_db
      connectionTimeout: 120
      queryHistoryTable: system.query.history
      connectionOptions: {}
      connectionArguments: {}
  sourceConfig:
    config:
      type: DatabaseMetadata
      markDeletedTables: true
      includeTables: true
      includeViews: true
      includeStoredProcedures: false
      includeDDL: true
      schemaFilterPattern:
        excludes:
        - information_schema.*
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  loggerLevel: DEBUG
