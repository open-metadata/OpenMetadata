name: UI Checkstyle

on:
  workflow_dispatch:
  # Trigger analysis when creating or updating a pull request.
  pull_request_target:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "openmetadata-ui/src/main/resources/ui/**"
      - "openmetadata-spec/src/main/resources/json/schema/**"
      - ".github/workflows/ui-checkstyle.yml"

permissions:
  contents: read

concurrency:
  group: ui-checkstyle-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Authorize (Check Labels)
  # ──────────────────────────────────────────────────────────────────────────
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the labeler
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: Team Label
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 90

      - name: Verify PR labels
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: jesusvasquez333/verify-pr-label-action@v1.4.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          valid-labels: "safe to test"
          pull-request-number: "${{ github.event.pull_request.number }}"
          disable-reviews: true

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: UI Style Checks (One Job, Separate Steps)
  # ──────────────────────────────────────────────────────────────────────────
  ui-checkstyle:
    needs: authorize
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"
          cache: "yarn"
          cache-dependency-path: "openmetadata-ui/src/main/resources/ui/yarn.lock"

      - name: Install Antlr4 CLI
        run: sudo make install_antlr_cli

      - name: Install Yarn Packages
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn install --frozen-lockfile

      - name: Run Linting Checks
        id: lint
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn organize-imports
          yarn lint:fix
          yarn pretty
          yarn license-header-fix

          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            git status --porcelain
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on Linting Failure
        if: steps.lint.outputs.changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ UI Linting Failed
            Some files need formatting or license headers. Please run the following in `openmetadata-ui/src/main/resources/ui`:
            ```bash
            yarn organize-imports && yarn lint:fix && yarn pretty && yarn license-header-fix
            ```

      - name: Reset working tree after lint check
        run: git checkout -- .

      - name: Run I18n Sync Check
        id: i18n
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn i18n
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            git status --porcelain
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on I18n Failure
        if: steps.i18n.outputs.changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ UI I18n Sync Failed
            Localization files are out of sync. Please run the following in `openmetadata-ui/src/main/resources/ui`:
            ```bash
            yarn i18n
            ```

      - name: Reset working tree after i18n check
        run: git checkout -- .

      - name: Run App Docs Check
        id: docs
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          yarn generate:app-docs
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            git status --porcelain
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on Docs Failure
        if: steps.docs.outputs.changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### ❌ UI App Docs Out of Date
            Application documentation needs to be regenerated. Please run the following in `openmetadata-ui/src/main/resources/ui`:
            ```bash
            yarn generate:app-docs
            ```

      - name: Fail if any check detected changes or failed
        if: steps.lint.outputs.changes == 'true' || steps.i18n.outputs.changes == 'true' || steps.docs.outputs.changes == 'true' || steps.lint.outcome != 'success' || steps.i18n.outcome != 'success' || steps.docs.outcome != 'success'
        run: |
          echo "One or more checkstyle steps introduced changes or did not complete successfully."
          exit 1