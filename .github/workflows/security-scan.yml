name: security-scan
on:
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    environment: security-scan
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "openmetadata-ui/src/main/resources/ui/.nvmrc"

      - name: Enable yarn
        run: corepack enable

      - name: Install UI dependencies
        working-directory: openmetadata-ui/src/main/resources/ui
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Run Retire.js scan
        id: retire-scan
        continue-on-error: true
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          npx retire@5 \
            --path node_modules/ \
            --severity high \
            --outputformat json \
            --outputpath retire-report.json

      - name: Verify report was generated
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          if [ ! -f retire-report.json ]; then
            echo '::error::retire-report.json was not generated — retire scan may have crashed'
            exit 1
          fi

      - name: Upload Retire.js Report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: retire-js-report
          path: openmetadata-ui/src/main/resources/ui/retire-report.json
          retention-days: 30

      - name: Publish Retire.js Summary
        if: success()
        working-directory: openmetadata-ui/src/main/resources/ui
        run: |
          python3 - << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json

          SEVERITY_ICON = {"critical": "🚨", "high": "🔴", "medium": "🟠", "low": "🟡"}
          SEVERITY_ORDER = {"critical": 0, "high": 1, "medium": 2, "low": 3}
          NM = "node_modules/"

          def escape(text):
              return str(text).replace('|', '\\|').replace('`', "'")

          try:
              with open("retire-report.json") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("## Retire.js Scan Results\n\n> Report file not found — scan may not have run.")
              raise SystemExit(0)

          findings = data.get("data", [])
          libs = {}
          for item in findings:
              filepath = item.get("file", "")
              short = filepath[filepath.find(NM) + len(NM):] if NM in filepath else filepath
              for result in item.get("results", []):
                  key = (result.get("component", ""), result.get("version", ""))
                  if key not in libs:
                      libs[key] = {"files": [], "vulns": result.get("vulnerabilities", [])}
                  if short not in libs[key]["files"]:
                      libs[key]["files"].append(short)

          print("## Retire.js Scan Results\n")

          if not libs:
              print("✅ No vulnerable libraries found.")
          else:
              total_vulns = sum(len(v["vulns"]) for v in libs.values())
              print(f"> **{len(libs)} vulnerable librar{'y' if len(libs) == 1 else 'ies'} · {total_vulns} CVE{'s' if total_vulns != 1 else ''} found**\n")

              for (component, version), info in sorted(libs.items(), key=lambda x: min(
                      (SEVERITY_ORDER.get(v.get("severity", "low"), 3) for v in x[1]["vulns"]), default=3)):
                  top_sev = min(info["vulns"], key=lambda v: SEVERITY_ORDER.get(v.get("severity", "low"), 3))
                  icon = SEVERITY_ICON.get(top_sev.get("severity", "low"), "⚪")
                  print(f"### {icon} {component} {version}\n")
                  print("| Severity | CVE | Summary |")
                  print("|---|---|---|")
                  for vuln in sorted(info["vulns"], key=lambda v: SEVERITY_ORDER.get(v.get("severity", "low"), 3)):
                      sev = vuln.get("severity", "")
                      ids = vuln.get("identifiers", {})
                      cves = ids.get("CVE", [])
                      summary = ids.get("summary", "").split("\n")[0][:120]
                      cve_str = ", ".join(f"[{c}](https://nvd.nist.gov/vuln/detail/{c})" for c in cves) if cves else ids.get("githubID", "—")
                      print(f"| {SEVERITY_ICON.get(sev, '')} {sev} | {escape(cve_str)} | {escape(summary)} |")
                  print("\n**Bundled in:**")
                  for f in info["files"]:
                      print(f"- `{f}`")
                  print()
          EOF

      - name: Slack on Failure
        if: steps.retire-scan.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.23.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_IDS }}
          payload: |
            {
              "text": "🚨 Vulnerability scan failed on branch `${{ github.ref_name }}`, please check it <https://github.com/open-metadata/OpenMetadata/actions/runs/${{ github.run_id }}|here>. 🚨"
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Slack on Success
        if: steps.retire-scan.outcome == 'success'
        uses: slackapi/slack-github-action@v1.23.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_IDS }}
          payload: |
            {
              "text": "🟢 Vulnerability scan passed for OpenMetadata Repo on branch `${{ github.ref_name }}`, please check it <https://github.com/open-metadata/OpenMetadata/actions/runs/${{ github.run_id }}|here>."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Force failure on vulnerabilities found
        if: steps.retire-scan.outcome == 'failure'
        run: exit 1

  security-scan:
    runs-on: ubuntu-latest
    environment: security-scan
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_ORGANIZATION: ${{ secrets.SNYK_ORGANIZATION_ID }}

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Ubuntu dependencies
        run: |
          # stop relying on apt cache of GitHub runners
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev python3-venv librdkafka-dev gcc libsasl2-dev build-essential libssl-dev libffi-dev \
          librdkafka-dev unixodbc-dev libevent-dev wkhtmltopdf libkrb5-dev

      # Install and Authenticate to Snyk
      - name: Install Snyk & Authenticate
        run: |
          sudo make install_antlr_cli
          sudo npm install -g snyk
          snyk auth ${SNYK_TOKEN}
          snyk config set org=${SNYK_ORGANIZATION}

      - name: Install Python dependencies
        run: |
          python3 -m venv env
          source env/bin/activate
          make install_all install_apis

      - name: Maven build
        id: maven-build
        continue-on-error: true
        run: mvn -DskipTests clean install

      - name: Run Scan
        id: security-report
        if: steps.maven-build.outcome == 'success'
        continue-on-error: true
        run: |
          source env/bin/activate
          make snyk-report

      - name: Publish Snyk Summary
        if: always() && steps.maven-build.outcome == 'success'
        run: |
          python3 - << 'EOF' >> $GITHUB_STEP_SUMMARY
          import json, os, glob, re

          SEV_ICON = {"critical": "🚨", "high": "🔴", "medium": "🟠", "low": "🟡"}
          SEV_RANK = {"critical": 0, "high": 1, "medium": 2, "low": 3}

          def esc(s):
              return str(s).replace("|", "\\|").replace("`", "'").replace("\n", " ")

          def sev_key(s):
              return SEV_RANK.get((s or "low").lower(), 3)

          def load(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except Exception as e:
                  return {"_error": str(e)}

          def iter_projects(data):
              # snyk test --all-projects can return list; single project returns dict
              if isinstance(data, list):
                  for d in data:
                      yield d
              elif isinstance(data, dict):
                  yield data

          def render_deps(name, data):
              print(f"\n### 📦 {name}\n")
              total_vulns = 0
              libs = {}  # (pkg, version) -> {sev, cves, title, fixedIn, paths}
              for proj in iter_projects(data):
                  if not isinstance(proj, dict):
                      continue
                  for v in proj.get("vulnerabilities", []) or []:
                      key = (v.get("packageName", "?"), v.get("version", "?"))
                      entry = libs.setdefault(key, {
                          "sev": "low", "cves": set(), "titles": set(),
                          "fixedIn": set(), "paths": 0, "ids": set(),
                      })
                      if sev_key(v.get("severity")) < sev_key(entry["sev"]):
                          entry["sev"] = v.get("severity", "low")
                      for cve in (v.get("identifiers", {}) or {}).get("CVE", []) or []:
                          entry["cves"].add(cve)
                      entry["titles"].add(v.get("title", ""))
                      for fx in v.get("fixedIn", []) or []:
                          entry["fixedIn"].add(fx)
                      entry["ids"].add(v.get("id", ""))
                      entry["paths"] += 1
                      total_vulns += 1
              if not libs:
                  print("✅ No vulnerabilities.\n")
                  return
              print(f"> **{len(libs)} vulnerable librar{'y' if len(libs)==1 else 'ies'} · {total_vulns} finding{'s' if total_vulns!=1 else ''}**\n")
              print("| Sev | Package | Version | CVE / ID | Title | Fix in | Paths |")
              print("|---|---|---|---|---|---|---|")
              for (pkg, ver), info in sorted(libs.items(), key=lambda kv: sev_key(kv[1]["sev"])):
                  sev = info["sev"]
                  ids = sorted(info["cves"]) or sorted(i for i in info["ids"] if i)[:1]
                  ids_str = ", ".join(f"[{c}](https://nvd.nist.gov/vuln/detail/{c})" if c.startswith("CVE") else c for c in ids) or "—"
                  title = sorted(info["titles"])[0][:80] if info["titles"] else ""
                  fix = ", ".join(sorted(info["fixedIn"])[:2]) or "—"
                  print(f"| {SEV_ICON.get(sev,'⚪')} {sev} | `{esc(pkg)}` | {esc(ver)} | {esc(ids_str)} | {esc(title)} | {esc(fix)} | {info['paths']} |")
              print()

          def render_code(name, data):
              # SARIF-like format from `snyk code test --json`
              print(f"\n### 🔎 {name} (Code)\n")
              runs = data.get("runs", []) if isinstance(data, dict) else []
              findings = {}  # (ruleId, file) -> [lines]
              rules = {}
              for run in runs:
                  for rule in (run.get("tool", {}).get("driver", {}).get("rules", []) or []):
                      rules[rule.get("id")] = rule.get("shortDescription", {}).get("text", rule.get("name", ""))
                  for r in run.get("results", []) or []:
                      rid = r.get("ruleId", "?")
                      level = r.get("level", "warning")
                      for loc in r.get("locations", []) or []:
                          phys = loc.get("physicalLocation", {})
                          uri = phys.get("artifactLocation", {}).get("uri", "?")
                          line = phys.get("region", {}).get("startLine", "?")
                          findings.setdefault((rid, uri, level), []).append(line)
              if not findings:
                  print("✅ No code findings.\n")
                  return
              # group by rule
              by_rule = {}
              for (rid, uri, level), lines in findings.items():
                  by_rule.setdefault(rid, []).append((uri, level, lines))
              print(f"> **{sum(len(v) for v in by_rule.values())} location{'s' if sum(len(v) for v in by_rule.values())!=1 else ''} across {len(by_rule)} rule{'s' if len(by_rule)!=1 else ''}**\n")
              for rid, items in sorted(by_rule.items()):
                  desc = rules.get(rid, rid)
                  print(f"<details><summary><b>{esc(rid)}</b> — {esc(desc)} ({len(items)})</summary>\n")
                  print("| Level | File | Lines |")
                  print("|---|---|---|")
                  for uri, level, lines in sorted(items):
                      ln = ", ".join(str(x) for x in sorted(set(lines))[:10])
                      icon = "🔴" if level == "error" else "🟠"
                      print(f"| {icon} {level} | `{esc(uri)}` | {esc(ln)} |")
                  print("\n</details>\n")

          print("## 🛡️ Snyk Security Scan\n")
          files = sorted(glob.glob("security-report/*.json"))
          if not files:
              print("> No reports generated.")
              raise SystemExit(0)
          for path in files:
              name = os.path.basename(path).replace(".json", "")
              data = load(path)
              if "_error" in data:
                  print(f"\n### ⚠️ {name}\nFailed to parse: {data['_error']}\n")
                  continue
              if isinstance(data, dict) and "runs" in data:
                  render_code(name, data)
              else:
                  render_deps(name, data)
          EOF

      - name: Slack on Failure
        if: steps.security-report.outcome != 'success'
        uses: slackapi/slack-github-action@v1.23.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_IDS }}
          payload: |
            {
              "text": "🚨 Security report failed on branch `${{ github.ref_name }}`, please check it <https://github.com/open-metadata/OpenMetadata/actions/runs/${{ github.run_id }}|here>. 🚨"
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Slack on Success
        if: steps.security-report.outcome == 'success'
        uses: slackapi/slack-github-action@v1.23.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_IDS }}
          payload: |
            {
              "text": "🟢 Security report generated for OpenMetadata Repo on branch `${{ github.ref_name }}`, please check it <https://github.com/open-metadata/OpenMetadata/actions/runs/${{ github.run_id }}|here>."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Upload Snyk JSON Reports
        if: always() && steps.maven-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report/*.json
          retention-days: 30

      - name: Force failure
        if: steps.maven-build.outcome != 'success' || steps.security-report.outcome != 'success'
        run: |
          exit 1
