# CLI E2E v2 — strangler-fig replacement for py-cli-e2e-tests.yml.
#
# Each connector lives under ingestion/tests/cli_e2e_v2/<connector>/ and
# is a self-contained pytest module (no inheritance). The matrix below
# grows by one entry per connector migration PR; the connector's
# corresponding entry is removed from py-cli-e2e-tests.yml in the same PR.
#
# Triggers: workflow_dispatch only during the stabilization window for
# the MySQL pilot. The schedule cron will be added once the pilot is
# consistently green (see spec §7.1).

name: py-cli-e2e-tests-v2
on:
  workflow_dispatch:
    inputs:
      connectors:
        description: "Connectors to run (JSON array)"
        required: true
        default: '["mysql"]'

permissions:
  id-token: write
  contents: read

jobs:
  py-cli-e2e-tests-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        connector: ${{ fromJSON(inputs.connectors || '["mysql"]') }}
    environment: test

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
          docker-images: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Openmetadata Test Environment
        uses: ./.github/actions/setup-openmetadata-test-environment
        with:
          python-version: '3.10'

      - name: Bootstrap MySQL grants for CLI E2E v2
        if: matrix.connector == 'mysql'
        # The bundled docker-compose mysql-script.sql provisions
        # openmetadata_user with privileges scoped to openmetadata_db.* —
        # which is correct for the OM server's metadata storage. The CLI
        # E2E v2 framework needs additional read access on the e2e schema
        # the baseline enforcer creates on demand. Grants are issued here
        # (not in docker/mysql/mysql-script.sql) so the test framework's
        # privilege footprint stays out of the shared infra image.
        # MySQL stores the grant ahead of schema creation — they take
        # effect once the enforcer creates `e2e`.
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -ppassword <<'SQL'
          GRANT SELECT, EXECUTE, SHOW VIEW ON e2e.* TO 'openmetadata_user'@'%';
          GRANT SHOW_ROUTINE ON *.* TO 'openmetadata_user'@'%';
          FLUSH PRIVILEGES;
          SQL

      - name: Run CLI E2E v2 tests
        id: e2e-v2-test
        env:
          # MySQL pilot runs against the Docker-Compose MySQL spun up by the
          # setup action above. Values are public docker-compose defaults — not
          # secrets. The two credential pairs below are documented in the
          # spec §4.9 admin-vs-ingest split: the scoped ingest user can't
          # CREATE SCHEMA / TABLE / INSERT, so the enforcer uses root.
          E2E_MYSQL_HOST_PORT: localhost:3306
          E2E_MYSQL_USER: openmetadata_user
          E2E_MYSQL_PASSWORD: openmetadata_password
          E2E_MYSQL_ADMIN_USER: root
          E2E_MYSQL_ADMIN_PASSWORD: password
          # OM admin minting the ingestion-bot JWT at session start. Baked
          # into the bundled docker-compose; not secret.
          OM_ADMIN_EMAIL: admin@open-metadata.org
          OM_ADMIN_PASSWORD: admin
        run: |
          source env/bin/activate
          cd ingestion
          mkdir -p junit
          pytest -v \
            --junitxml=junit/test-results-v2-${{ matrix.connector }}.xml \
            tests/cli_e2e_v2/${{ matrix.connector }}
        shell: bash

      - name: Upload tests artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-v2-${{ matrix.connector }}
          path: ingestion/junit/test-results-v2-*.xml

      - name: Clean Up
        if: always()
        run: |
          cd ./docker/development
          docker compose down --remove-orphans
          sudo rm -rf ${PWD}/docker-volume
