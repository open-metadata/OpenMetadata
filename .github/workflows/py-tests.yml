name: py-tests
on:
  merge_group:
  workflow_dispatch:
  pull_request_target:
    types: [labeled, opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request_target' || github.event.action != 'labeled' || github.event.label.name == 'safe to test' }}

env:
  # matrix can't use 'env'. When updating it, update it for both jobs.
  MAIN_PYTHON_VERSION: "3.10"
  SONAR_OPTS: >-
    -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
    -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
    -Dsonar.pullrequest.github.repository=OpenMetadata
    -Dsonar.scm.revision=${{ github.event.pull_request.head.sha }}
    -Dsonar.pullrequest.provider=github

jobs:
  # Authorize pull request code once before the matrix fans out, then detect
  # whether relevant paths changed.
  changes:
    name: Authorize & Detect Changes
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft && (github.event_name != 'pull_request_target' || github.event.action != 'labeled' || github.event.label.name == 'safe to test') }}
    outputs:
      python: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.python }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: ${{ github.event_name == 'merge_group' }}
        with:
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false
      - uses: dorny/paths-filter@v4
        id: filter
        if: ${{ github.event_name == 'pull_request_target' || github.event_name == 'merge_group' }}
        with:
          base: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || '' }}
          filters: |
            python:
              - 'ingestion/**'
              - 'openmetadata-service/**'
              - 'openmetadata-spec/src/main/resources/json/schema/**'
              - 'openmetadata-dist/**'
              - 'bootstrap/**'
              - 'conf/**'
              - 'docker/run_local_docker.sh'
              - 'docker/run_local_docker_common.sh'
              - 'docker/development/docker-compose.yml'
              - 'docker/development/docker-compose-postgres.yml'
              - '.github/actions/setup-openmetadata-test-environment/**'
              - '.github/scripts/configure_docker_storage.sh'
              - '.github/scripts/classify_test_outcome.py'
              - '.github/workflows/py-tests.yml'
              - 'pom.xml'
              - 'Makefile'

      - name: Wait for the labeler
        uses: lewagon/wait-on-check-action@v1.7.0
        if: ${{ github.event_name == 'pull_request_target' && steps.filter.outputs.python == 'true' }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: Team Label
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Verify PR labels
        uses: jesusvasquez333/verify-pr-label-action@v1.4.0
        if: ${{ github.event_name == 'pull_request_target' && steps.filter.outputs.python == 'true' }}
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          valid-labels: "safe to test"
          pull-request-number: "${{ github.event.pull_request.number }}"
          disable-reviews: true

  py-unit-tests:
    name: Unit Tests & Static Checks
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        py-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'merge_group' && github.sha || github.event.pull_request.head.sha }}
          allow-unsafe-pr-checkout: true
          persist-credentials: false
      - name: Setup Openmetadata Test Environment
        uses: ./.github/actions/setup-openmetadata-test-environment
        with:
          python-version: ${{ matrix.py-version }}
          install-server: 'false'

      - name: Run Static Checks
        # basedpyright is configured with `pythonVersion = "3.10"` (the lowest
        # supported version) so type-checking results are identical across the
        # 3.10/3.11/3.12 matrix. Run on the lowest version only to avoid
        # redundant work and keep the baseline file deterministic.
        if: matrix.py-version == '3.10'
        run: |
          set -o pipefail
          source env/bin/activate
          cd ingestion
          nox --no-venv -s static-checks 2>&1 | tee static-checks-run.log
        shell: bash

      - name: Run Unit Tests
        id: unit-tests
        run: |
          set -o pipefail
          source env/bin/activate
          cd ingestion
          nox --no-venv -s unit-tests 2>&1 | tee unit-test-run.log
        shell: bash

      - name: Classify Python unit test outcome
        if: ${{ always() }}
        env:
          TEST_LANE: python-${{ matrix.py-version }}
          TEST_PROFILE: python-unit
          TEST_STEP_OUTCOME: ${{ steps.unit-tests.outcome }}
        run: |
          python3 .github/scripts/classify_test_outcome.py \
            --step-outcome "$TEST_STEP_OUTCOME" \
            --report-glob 'ingestion/junit/test-results-*.xml' \
            --diagnostic-glob 'ingestion/*-test-run.log' \
            --diagnostic-glob 'ingestion/static-checks-run.log' \
            --output ingestion/ci-diagnostics/outcome.json

      - name: Upload test results
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: py-unit-test-results-${{ matrix.py-version }}
          path: |
            ingestion/junit/
            ingestion/ci-diagnostics/outcome.json
            ingestion/*-test-run.log
            ingestion/static-checks-run.log
          if-no-files-found: warn
          retention-days: 14
          compression-level: 1

      - name: Upload coverage artifact
        if: ${{ matrix.py-version == env.MAIN_PYTHON_VERSION && !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ingestion/.coverage
          include-hidden-files: true

  py-integration-tests:
    name: "Integration Tests (${{ matrix.shard.name }}, ${{ matrix.py-version }})"
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    timeout-minutes: 180
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        py-version: ["3.10", "3.11", "3.12"]
        shard:
          - name: "shard-1"
            nox-args: >-
              tests/integration/ometa
              tests/integration/postgres
              tests/integration/mysql
              tests/integration/profiler
              tests/integration/data_quality
              tests/integration/sql_server
          - name: "shard-2"
            nox-args: >-
              --ignore=tests/integration/ometa
              --ignore=tests/integration/postgres
              --ignore=tests/integration/mysql
              --ignore=tests/integration/profiler
              --ignore=tests/integration/data_quality
              --ignore=tests/integration/sql_server
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
          docker-images: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'merge_group' && github.sha || github.event.pull_request.head.sha }}
          allow-unsafe-pr-checkout: true
          persist-credentials: false
      - name: Use runner data disk for Docker
        if: matrix.shard.name == 'shard-2'
        run: bash .github/scripts/configure_docker_storage.sh

      - name: Setup Openmetadata Test Environment
        uses: ./.github/actions/setup-openmetadata-test-environment
        with:
          python-version: ${{ matrix.py-version}}
          args: "-m no-ui"
          ingestion_dependency: "mysql,elasticsearch,sample-data"

      - name: Reclaim unused disk for the Exasol shard
        if: matrix.shard.name == 'shard-2'
        continue-on-error: true
        run: |
          {
            echo "Before Exasol shard disk reclaim"
            df -h
            docker system df
            sudo rm -rf /opt/hostedtoolcache/CodeQL
            docker image prune --all --force || true
            docker builder prune --all --force || true
            echo "After Exasol shard disk reclaim"
            df -h
            docker system df
          } 2>&1 | tee "${RUNNER_TEMP}/exasol-disk-reclaim.log"
        shell: bash

      - name: Run Integration Tests
        id: integration-tests
        run: |
          set -o pipefail
          source env/bin/activate
          cd ingestion
          read -r -a shard_args <<< "$NOX_ARGS"
          nox --no-venv -s integration-tests -- --standalone --durations=5 "${shard_args[@]}" 2>&1 | tee integration-test-run.log
        env:
          NOX_ARGS: ${{ matrix.shard.nox-args }}
          TESTCONTAINERS_RYUK_DISABLED: true
        shell: bash

      - name: Classify Python integration test outcome
        if: ${{ always() }}
        env:
          TEST_LANE: ${{ matrix.shard.name }}-python-${{ matrix.py-version }}
          TEST_PROFILE: python-integration
          TEST_STEP_OUTCOME: ${{ steps.integration-tests.outcome }}
        run: |
          python3 .github/scripts/classify_test_outcome.py \
            --step-outcome "$TEST_STEP_OUTCOME" \
            --report-glob 'ingestion/junit/test-results-*.xml' \
            --diagnostic-glob 'ingestion/integration-test-run.log' \
            --output ingestion/ci-diagnostics/outcome.json

      - name: Upload coverage artifact
        if: ${{ matrix.py-version == env.MAIN_PYTHON_VERSION && !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-${{ matrix.shard.name }}
          path: ingestion/.coverage
          include-hidden-files: true

      - name: Upload test results
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: py-integration-test-results-${{ matrix.shard.name }}-${{ matrix.py-version }}
          path: |
            ingestion/junit/
            ingestion/ci-diagnostics/outcome.json
            ingestion/integration-test-run.log
          if-no-files-found: warn
          retention-days: 14
          compression-level: 1

      - name: Collect runner and service diagnostics
        if: ${{ failure() || cancelled() }}
        continue-on-error: true
        run: |
          diagnostics="${RUNNER_TEMP}/python-ci-diagnostics"
          rm -rf "$diagnostics"
          mkdir -p "$diagnostics"
          df -h > "$diagnostics/disk-usage.txt" 2>&1 || true
          free -h > "$diagnostics/memory-usage.txt" 2>&1 || true
          docker info > "$diagnostics/docker-info.txt" 2>&1 || true
          docker system df > "$diagnostics/docker-disk-usage.txt" 2>&1 || true
          docker ps --all --no-trunc > "$diagnostics/docker-containers.txt" 2>&1 || true
          if [ -d docker/development ]; then
            (cd docker/development && docker compose ps --all) > "$diagnostics/docker-compose-ps.txt" 2>&1 || true
            (cd docker/development && docker compose logs --no-color --tail 2000) > "$diagnostics/docker-compose.log" 2>&1 || true
          fi
          coredumpctl --no-pager list > "$diagnostics/coredumps.txt" 2>&1 || true
          coredumpctl --no-pager info >> "$diagnostics/coredumps.txt" 2>&1 || true
          find "$GITHUB_WORKSPACE" /tmp /var/crash -maxdepth 3 -type f \
            \( -name 'core' -o -name 'core.*' -o -name '*.core' -o -name '*.dmp' -o -name '*.crash' \) \
            -printf '%p %s bytes\n' >> "$diagnostics/core-files.txt" 2>/dev/null || true
          if [ -f "${RUNNER_TEMP}/exasol-disk-reclaim.log" ]; then
            cp "${RUNNER_TEMP}/exasol-disk-reclaim.log" "$diagnostics/"
          fi
        shell: bash

      - name: Upload runner and service diagnostics
        if: ${{ failure() || cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: py-integration-diagnostics-${{ matrix.shard.name }}-${{ matrix.py-version }}
          path: ${{ runner.temp }}/python-ci-diagnostics/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 1

      - name: Clean Up
        if: ${{ always() }}
        continue-on-error: true
        run: |
          cd ./docker/development
          docker compose down --remove-orphans || true
          sudo rm -rf "${PWD}/docker-volume"

  # Set "py-tests / py-tests-status" as the sole required check for this workflow.
  py-tests-status:
    name: ${{ github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name != 'safe to test' && 'py-tests-status (ignored label)' || 'py-tests-status' }}
    needs: [changes, py-unit-tests, py-integration-tests]
    if: ${{ always() && !github.event.pull_request.draft && (github.event_name != 'pull_request_target' || github.event.action != 'labeled' || github.event.label.name == 'safe to test') }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify all expected Python jobs completed
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          PYTHON_CHANGED: ${{ needs.changes.outputs.python }}
          UNIT_RESULT: ${{ needs.py-unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.py-integration-tests.result }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "Python preflight did not succeed: $CHANGES_RESULT"
            exit 1
          fi

          if [ "$PYTHON_CHANGED" = "true" ]; then
            if [ "$UNIT_RESULT" != "success" ] || [ "$INTEGRATION_RESULT" != "success" ]; then
              echo "Expected Python jobs did not succeed: unit=$UNIT_RESULT integration=$INTEGRATION_RESULT"
              exit 1
            fi
          elif [ "$PYTHON_CHANGED" = "false" ]; then
            if [ "$UNIT_RESULT" != "skipped" ] || [ "$INTEGRATION_RESULT" != "skipped" ]; then
              echo "Unexpected Python job result for an unchanged tree: unit=$UNIT_RESULT integration=$INTEGRATION_RESULT"
              exit 1
            fi
          else
            echo "Python change detection produced an invalid result: $PYTHON_CHANGED"
            exit 1
          fi
        shell: bash

  py-combine-coverage:
    needs: [changes, py-unit-tests, py-integration-tests]
    if: ${{ always() && needs.changes.outputs.python == 'true' && needs.py-unit-tests.result == 'success' && needs.py-integration-tests.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'merge_group' && github.sha || github.event.pull_request.head.sha }}
          fetch-depth: 0
          filter: blob:none
          allow-unsafe-pr-checkout: true
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv
        shell: bash

      - name: Install coverage
        run: |
          python3 -m venv env
          source env/bin/activate
          uv pip install "coverage[toml]" nox
        shell: bash

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: ingestion/coverage-data/

      - name: Prepare coverage files
        run: |
          cd ingestion
          [ -f coverage-data/coverage-unit/.coverage ] && mv coverage-data/coverage-unit/.coverage .coverage.unit
          for dir in coverage-data/coverage-integration-*/; do
            shard=$(basename "$dir" | sed 's/coverage-integration-//')
            [ -f "$dir/.coverage" ] && mv "$dir/.coverage" ".coverage.integration-$shard"
          done
        shell: bash

      - name: Combine coverage
        run: |
          source env/bin/activate
          cd ingestion
          nox --no-venv -s combine-coverage
        shell: bash

      - name: Remove pom.xml
        run: rm pom.xml
        shell: bash

        # we have to pass these args values since we are working with the 'pull_request_target' trigger
      - name: Push Results in PR to Sonar
        id: push-to-sonar
        if: ${{ github.event_name == 'pull_request_target'}}
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.INGESTION_SONAR_SECRET }}
        with:
          projectBaseDir: ingestion/
          args: ${{ env.SONAR_OPTS }}
