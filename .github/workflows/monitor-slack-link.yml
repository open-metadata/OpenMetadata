name: monitor-slack-link
on:
  schedule:
    - cron:  '0 */2 * * *'
  workflow_dispatch:
    inputs:
      deployment_type:
        description: 'Deployment type to monitor'
        required: true
        default: 'open-metadata'
        type: choice
        options:
          - open-metadata
          - free-tier-collate

permissions:
  id-token: write
  contents: read

jobs:
  monitor-slack-link:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        deployment_type: ${{ github.event_name == 'workflow_dispatch' && [github.event.inputs.deployment_type] || ['open-metadata', 'free-tier-collate'] }}

    steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true      
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: 3.9

    - name: Install Deps
      run: |
        python -m venv env
        source env/bin/activate
        pip install requests

    - name: Monitor Link
      id: monitor
      continue-on-error: true
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        source env/bin/activate
        python scripts/slack-link-monitor.py ${{ matrix.deployment_type }}

    - name: Slack on Failure
      if: steps.monitor.outcome != 'success'
      uses: slackapi/slack-github-action@v1.23.0
      with:
        payload: |
          {
            "text": "🔥 Slack invitation link for ${{ matrix.deployment_type }} has expired! 🔥"
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_MONITOR_SLACK_WEBHOOK }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

    - name: Force failure
      if: steps.monitor.outcome != 'success'
      run: |
        exit 1