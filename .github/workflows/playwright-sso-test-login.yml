# Runs the `sso-test-login` Playwright project on PRs.
#
# The project covers the in-app Test Login flow on the SSO Configuration
# page across three providers (Custom OIDC, SAML, LDAP). Specs live in
# `openmetadata-ui/src/main/resources/ui/playwright/e2e/Features/SSOTestLogin-*.spec.ts`
# and the project is declared in `playwright.config.ts`.
#
# Fixtures:
#   - Custom OIDC: mock OIDC provider (sso-test profile, host port 9090)
#   - LDAP:        OpenLDAP test (sso-test profile, host port 1389)
#   - SAML:        Keycloak (separate compose, host port 8080)
#
# OpenMetadata itself boots with default basic auth — the admin logs in
# via basic and exercises Test Login from the SSO Configuration UI.

name: Playwright SSO Test Login

on:
  pull_request_target:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "openmetadata-ui/src/main/resources/ui/src/components/SettingsSso/**"
      - "openmetadata-ui/src/main/resources/ui/src/utils/SSOUtils*"
      - "openmetadata-ui/src/main/resources/ui/src/constants/SSO.constant*"
      - "openmetadata-ui/src/main/resources/ui/src/rest/securityConfigAPI*"
      - "openmetadata-ui/src/main/resources/ui/playwright/e2e/Features/SSOTestLogin-*.spec.ts"
      - "openmetadata-ui/src/main/resources/ui/playwright/utils/sso-providers/**"
      - "openmetadata-ui/src/main/resources/ui/playwright/utils/sso.ts"
      - "openmetadata-ui/src/main/resources/ui/playwright/utils/sso-test-fixtures.ts"
      - "openmetadata-ui/src/main/resources/ui/playwright.config.ts"
      - "openmetadata-service/src/main/java/org/openmetadata/service/security/auth/TestLoginHandler*"
      - "openmetadata-service/src/main/java/org/openmetadata/service/security/auth/TestSamlHandler*"
      - "openmetadata-service/src/main/java/org/openmetadata/service/security/auth/TestLdapHandler*"
      - "openmetadata-service/src/main/java/org/openmetadata/service/security/auth/TestLoginResponses*"
      - "openmetadata-service/src/main/java/org/openmetadata/service/resources/system/ConfigResource*"
      - "openmetadata-service/src/main/java/org/openmetadata/service/jdbi3/SystemRepository*"
      - "openmetadata-spec/src/main/resources/json/schema/configuration/authenticationConfiguration.json"
      - "docker/development/docker-compose.yml"
      - "docker/development/mock-oidc-provider/**"
      - "docker/development/openldap-seed/**"
      - "docker/development/.env.sso-test"
      - "docker/local-sso/keycloak-saml/**"
      - ".github/workflows/playwright-sso-test-login.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sso-test-login-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sso-test-login:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    environment: test
    timeout-minutes: 60

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
          docker-images: false

      - name: Wait for the labeler
        uses: lewagon/wait-on-check-action@v1.3.4
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: Team Label
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 90

      - name: Verify PR labels
        uses: jesusvasquez333/verify-pr-label-action@v1.4.0
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          valid-labels: "safe to test"
          pull-request-number: "${{ github.event.pull_request.number }}"
          disable-reviews: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup OpenMetadata Test Environment
        uses: ./.github/actions/setup-openmetadata-test-environment
        with:
          python-version: "3.10"
          args: "-d postgresql -i false"
          ingestion_dependency: "all"

      - name: Start SSO test fixtures (mock OIDC + OpenLDAP)
        run: |
          cd docker/development
          docker compose --profile sso-test build mock-oidc-provider openldap-test
          docker compose --profile sso-test up -d mock-oidc-provider openldap-test
          echo "Waiting for mock OIDC provider..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/health > /dev/null 2>&1; then
              echo "Mock OIDC provider is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Waiting for OpenLDAP..."
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/1389) > /dev/null 2>&1; then
              echo "OpenLDAP is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Start Keycloak SAML IdP
        run: |
          docker compose -f docker/local-sso/keycloak-saml/docker-compose.yml up -d
          timeout 240 bash -c 'until curl -fsS http://localhost:8080/realms/om-azure-saml >/dev/null; do sleep 2; done'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'openmetadata-ui/src/main/resources/ui/.nvmrc'

      - name: Install dependencies
        working-directory: openmetadata-ui/src/main/resources/ui/
        run: yarn --ignore-scripts --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright@1.57.0 install chromium --with-deps

      - name: Run sso-test-login Playwright project
        working-directory: openmetadata-ui/src/main/resources/ui
        env:
          SSO_USERNAME: ${{ vars.KEYCLOAK_AZURE_SAML_SSO_USERNAME }}
          SSO_PASSWORD: ${{ vars.KEYCLOAK_AZURE_SAML_SSO_PASSWORD || secrets.KEYCLOAK_AZURE_SAML_SSO_PASSWORD }}
          KEYCLOAK_SAML_BASE_URL: http://localhost:8080
          MOCK_OIDC_URL: http://localhost:9090
          PLAYWRIGHT_IS_OSS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx playwright test --project=sso-test-login --workers=1

      - name: Capture Docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          cd docker/development
          docker compose logs > ../../docker-logs/openmetadata.log 2>&1 || true
          docker compose --profile sso-test logs mock-oidc-provider > ../../docker-logs/mock-oidc.log 2>&1 || true
          docker compose --profile sso-test logs openldap-test > ../../docker-logs/openldap.log 2>&1 || true
          cd ../..
          docker compose -f docker/local-sso/keycloak-saml/docker-compose.yml logs > docker-logs/keycloak-saml.log 2>&1 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sso-test-login-results
          path: |
            openmetadata-ui/src/main/resources/ui/playwright/output/playwright-report
            openmetadata-ui/src/main/resources/ui/playwright/output/test-results
            openmetadata-ui/src/main/resources/ui/playwright-report
            openmetadata-ui/src/main/resources/ui/test-results
            docker-logs
          retention-days: 5
          if-no-files-found: ignore

      - name: Clean Up
        if: always()
        run: |
          docker compose -f docker/local-sso/keycloak-saml/docker-compose.yml down --remove-orphans 2>/dev/null || true
          cd ./docker/development
          docker compose --profile sso-test down --remove-orphans 2>/dev/null || true
          docker compose down --remove-orphans 2>/dev/null || true
          sudo rm -rf ${PWD}/docker-volume 2>/dev/null || true
