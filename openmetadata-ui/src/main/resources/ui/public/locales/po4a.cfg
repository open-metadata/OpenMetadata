# po4a configuration to translate the connector requirement docs (Markdown)
# under public/locales/<lang>/ (TEMPLATE — opt-in).
#
# po4a extracts translatable prose from the English Markdown into per-language
# PO files, protects code blocks / links / HTML, and regenerates the localized
# Markdown. The Collate directives ($$section … $$, $$note … $$, $(id="…")) are
# opaque text to po4a's Markdown parser and pass through with their structure
# intact — always diff the regenerated files before committing.
#
# Requires po4a (https://po4a.org):
#   cd openmetadata-ui/src/main/resources/ui/public/locales
#   po4a po4a.cfg
#
# PO files land in public/locales/po/<lang>.po; translate those, then re-run.

[options] opt:"--keep 0 --master-charset UTF-8 --localized-charset UTF-8"

[po4a_langs] sv
[po4a_paths] po/$lang.po $master:en-US

# One [type:text] entry per source doc; markdown mode preserves headings/lists.
# Add lines as more connectors are localized (mirror the en-US/ tree).
[type:text] Database/Oracle.md   $lang:sv-SE/Database/Oracle.md   opt:"-o markdown"
[type:text] Database/Redshift.md $lang:sv-SE/Database/Redshift.md opt:"-o markdown"
